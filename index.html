<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#0f5f8f">
    <meta name="robots" content="noindex, nofollow, noarchive, noimageindex">
    <meta name="googlebot" content="noindex, nofollow, noarchive, noimageindex">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="X-LINE">
    <title>X-LINE</title>
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="apple-touch-icon" href="icons/icon-192.png">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app-shell" aria-live="polite">
      <section class="screen screen-title is-active" id="titleScreen">
        <div class="brand-block">
          <p class="kicker">Mobile falling puzzle</p>
          <h1>X-LINE</h1>
          <p class="tagline">片手で遊べる、静かな集中のための落ちものパズル。</p>
        </div>

        <div class="mode-grid" aria-label="モード選択">
          <button class="mode-button" type="button" data-mode="endless">
            <span>Endless</span>
            <small>じっくり続ける基本ルール</small>
          </button>
          <button class="mode-button" type="button" data-mode="lines200">
            <span>200 Lines</span>
            <small>200ライン消してクリア</small>
          </button>
          <button class="mode-button" type="button" data-mode="stage">
            <span>Stage</span>
            <small>ゴールライン数を目指す</small>
          </button>
          <button class="mode-button" type="button" data-mode="longLine">
            <span>Long Line</span>
            <small>長いIミノで遊ぶ</small>
          </button>
        </div>
      </section>

      <section class="screen screen-game" id="gameScreen">
        <div class="game-topbar">
          <button class="pause-chip" id="optionButton" type="button" aria-label="オプション">Pause</button>
          <div class="score-chip" aria-label="スコア">
            <span>Score</span>
            <strong id="scoreLabel">0</strong>
          </div>
        </div>

        <div class="game-stage" id="gameStage">
          <aside class="side-panel hold-panel" aria-label="ホールド">
            <span>Hold</span>
            <canvas id="holdCanvas" width="96" height="72"></canvas>
          </aside>

          <div class="playfield-shell">
            <canvas id="gameCanvas" width="300" height="600" aria-label="ゲーム画面"></canvas>
            <div class="level-ribbon">
              <span id="modeLabel">Endless Lv 1</span>
            </div>
          </div>

          <aside class="side-panel next-panel" aria-label="次のテトリミノ">
            <span>Next</span>
            <canvas id="nextCanvas" width="96" height="156"></canvas>
          </aside>

          <div class="lines-panel" aria-label="合計ライン数">
            <span>Lines</span>
            <strong id="linesLabel">0</strong>
          </div>
        </div>

        <div class="gesture-hint" aria-hidden="true">
          <span>Swipe: move/drop/hold</span>
          <span>Tap left/right: rotate</span>
        </div>

        <div class="game-over-overlay" id="gameOverOverlay" hidden>
          <div class="game-over-panel">
            <p class="kicker">Result</p>
            <h2 id="resultTitle">GAME OVER</h2>
            <dl class="result-grid">
              <div>
                <dt>Score</dt>
                <dd id="finalScoreLabel">0</dd>
              </div>
              <div>
                <dt>Lines</dt>
                <dd id="finalLinesLabel">0</dd>
              </div>
            </dl>
            <div class="result-actions">
              <button id="retryButton" type="button">Retry</button>
              <button id="gameOverMenuButton" type="button">Main Menu</button>
            </div>
          </div>
        </div>
      </section>
    </main>

    <dialog class="options-dialog" id="optionsDialog">
      <form method="dialog" class="options-panel">
        <header>
          <h2>Options</h2>
          <button class="icon-button" type="submit" aria-label="閉じる">x</button>
        </header>

        <label class="volume-row">
          <span>音量</span>
          <input id="volumeInput" type="range" min="0" max="100" value="60">
        </label>

        <div class="option-actions">
          <button id="resumeButton" type="button">ゲームに戻る</button>
          <button id="restartButton" type="button">ステージのはじめから</button>
          <button id="quitButton" type="button">タイトルへ戻る</button>
        </div>
      </form>
    </dialog>

    <script src="app.js" type="module"></script>
  </body>
</html>
